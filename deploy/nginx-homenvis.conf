# ============================================================
# Nginx 配置 —— homenvis.allinsim.com（家见·Homenvis 室内流场仿真）
#
# 部署位置：拷到服务器的 /etc/nginx/conf.d/homenvis.conf
#           （或 /etc/nginx/sites-available/ + ln -s 到 sites-enabled/）
#
# Next.js 生产服务跑在 127.0.0.1:3000（pm2 守护，见 ecosystem.config.js），
# Nginx 按 server_name=homenvis.allinsim.com 反代过来。
# 已有的其他网站 server 块完全不用动，互不影响。
#
# HTTPS 证书申请（先让 DNS 的 A 记录指向本服务器，再执行）：
#   sudo certbot --nginx -d homenvis.allinsim.com
# certbot 会自动把下面的 80 段改成 443 SSL 并加上 80→443 跳转。
#
# 改完执行：sudo nginx -t && sudo nginx -s reload
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name homenvis.allinsim.com;

    # 临时用 80 跑通；certbot --nginx 后会自动改为 443 + 证书 + 跳转。
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / 升级头（Next.js 生产基本用不到，留着无害）
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # 大文件 / 长连接超时，避免保存大仿真结果时被掐断
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;
    }
}
